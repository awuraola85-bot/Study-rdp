name: 24-7 Cloud Server Platform
on:
  workflow_dispatch:
    inputs:
      windows_server:
        description: 'Deploy Windows Server'
        type: boolean
        default: true
      linux_server:
        description: 'Deploy Linux Server' 
        type: boolean
        default: true
  schedule:
    - cron: '0 */5 * * *'
    - cron: '15 */5 * * *'
    - cron: '30 */5 * * *'
    - cron: '45 */5 * * *'
  push:
    branches: [main, cloud]
    paths:
      - '.github/workflows/cloud-*.yml'

jobs:
  windows-cloud:
    if: ${{ github.event.inputs.windows_server != 'false' }}
    runs-on: windows-latest
    timeout-minutes: 350
    concurrency:
      group: windows-cloud-${{ github.run_id }}
      cancel-in-progress: false
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v3
        
      - name: 🏗️ Initialize Cloud Infrastructure
        shell: pwsh
        run: |
          # Stop errors from breaking the script
          $ErrorActionPreference = "Continue"
          
          # Set timezone to USA Eastern
          tzutil /s "Eastern Standard Time"
          
          # Create cloud directory structure
          $directories = @(
            "C:\Cloud",
            "C:\Cloud\Data",
            "C:\Cloud\WebServer",
            "C:\Cloud\WebServer\wwwroot",
            "C:\Cloud\Database",
            "C:\Cloud\Storage",
            "C:\Cloud\Backups",
            "C:\Cloud\Logs",
            "C:\Cloud\Config",
            "C:\Cloud\Downloads",
            "C:\Cloud\Temp"
          )
          
          foreach ($dir in $directories) {
            try {
              New-Item -ItemType Directory -Path $dir -Force -ErrorAction SilentlyContinue | Out-Null
              Write-Host "✓ Created: $dir"
            } catch {
              Write-Host "⚠ Could not create: $dir"
            }
          }
          
          # Initialize storage
          "Cloud Server Initialized: $(Get-Date)" | Out-File -FilePath "C:\Cloud\Logs\init.log" -Force
          
          Write-Host "Cloud infrastructure ready"

      - name: 🔧 Configure Windows Server Core
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          
          # Enable RDP properly
          try {
            Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
            Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fSingleSessionPerUser" -Value 0 -Force
            
            # Configure RDP security
            $rdpPath = 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp'
            Set-ItemProperty -Path $rdpPath -Name "UserAuthentication" -Value 0 -Force
            Set-ItemProperty -Path $rdpPath -Name "SecurityLayer" -Value 0 -Force
            
            # Start RDP service
            Set-Service TermService -StartupType Automatic
            Start-Service TermService -ErrorAction SilentlyContinue
            Restart-Service TermService -Force
            
            Write-Host "✓ RDP configured"
          } catch {
            Write-Host "⚠ RDP configuration issue: $_"
          }
          
          # Configure Firewall
          $ports = @(3389, 80, 443, 8080, 8443, 3000, 5000, 5001, 5432, 27017, 6379)
          foreach ($port in $ports) {
            try {
              $ruleName = "Cloud-Port-$port"
              netsh advfirewall firewall add rule name=$ruleName dir=in action=allow protocol=TCP localport=$port | Out-Null
              Write-Host "✓ Opened port $port"
            } catch {
              Write-Host "⚠ Could not open port $port"
            }
          }
          
          # Optimize system for server use
          try {
            powercfg /change standby-timeout-ac 0
            powercfg /change hibernate-timeout-ac 0
            powercfg /change monitor-timeout-ac 0
          } catch {}
          
          Write-Host "Windows server configured"

      - name: 👤 Create Cloud Administrator
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          
          # Generate secure credentials
          Add-Type -AssemblyName System.Web
          $password = [System.Web.Security.Membership]::GeneratePassword(24, 6)
          $securePassword = ConvertTo-SecureString $password -AsPlainText -Force
          
          # Remove existing user
          try {
            Remove-LocalUser -Name "CloudAdmin" -ErrorAction SilentlyContinue
          } catch {}
          
          # Create user
          try {
            New-LocalUser -Name "CloudAdmin" `
                         -Password $securePassword `
                         -PasswordNeverExpires `
                         -AccountNeverExpires `
                         -FullName "Cloud Administrator" `
                         -Description "Cloud Server Admin"
            
            # Add to groups
            Add-LocalGroupMember -Group "Administrators" -Member "CloudAdmin" -ErrorAction SilentlyContinue
            Add-LocalGroupMember -Group "Remote Desktop Users" -Member "CloudAdmin" -ErrorAction SilentlyContinue
            Add-LocalGroupMember -Group "Users" -Member "CloudAdmin" -ErrorAction SilentlyContinue
            
            Write-Host "✓ User CloudAdmin created"
          } catch {
            Write-Host "⚠ User creation issue: $_"
          }
          
          # Save credentials
          $credentialText = @"
========================================
CLOUD SERVER CREDENTIALS
========================================
Server Type: Windows Cloud Server
Username: CloudAdmin
Password: $password
RDP Port: 3389
Network: Tailscale VPN
========================================
Created: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')
========================================
"@
          
          $credentialText | Out-File -FilePath "C:\Cloud\Config\credentials.txt" -Encoding UTF8 -Force
          $credentialText | Out-File -FilePath "$env:USERPROFILE\Desktop\Cloud_Credentials.txt" -Encoding UTF8 -Force
          
          # Set environment variables
          echo "CLOUD_USER=CloudAdmin" >> $env:GITHUB_ENV
          echo "CLOUD_PASS=$password" >> $env:GITHUB_ENV
          
          Write-Host "Credentials saved to C:\Cloud\Config\credentials.txt"

      - name: 📦 Install Cloud Services (Windows)
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          
          Write-Host "Installing cloud services..."
          
          # Install Chocolatey (quietly)
          try {
            Set-ExecutionPolicy Bypass -Scope Process -Force
            [System.Net.ServicePointManager]::SecurityProtocol = 3072
            Invoke-Expression ((New-Object System.Net.WebClient).DownloadString('https://community.chocolatey.org/install.ps1')) | Out-Null
            Write-Host "✓ Chocolatey installed"
          } catch {
            Write-Host "⚠ Chocolatey installation skipped"
          }
          
          # Install core packages
          $packages = @("git", "nodejs", "python", "7zip", "curl", "wget", "nginx")
          foreach ($pkg in $packages) {
            try {
              choco install $pkg -y --limit-output --no-progress 2>$null
              Write-Host "✓ $pkg installed"
            } catch {
              Write-Host "⚠ $pkg skipped"
            }
          }
          
          # Enable IIS if needed
          try {
            Enable-WindowsOptionalFeature -Online -FeatureName IIS-WebServerRole -NoRestart -ErrorAction SilentlyContinue
            Write-Host "✓ IIS enabled"
          } catch {
            Write-Host "⚠ IIS not available"
          }
          
          Write-Host "Cloud services installation complete"

      - name: 🌐 Setup Web Server
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          
          # Create website files
          $indexHtml = @'
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Self-Hosted Cloud Server</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            max-width: 800px;
            width: 90%;
        }
        h1 { font-size: 2.5em; margin-bottom: 10px; }
        .status-badge {
            display: inline-block;
            background: #4CAF50;
            padding: 5px 15px;
            border-radius: 20px;
            margin: 10px 0;
        }
        .service-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        .service-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }
        .service-card h3 { margin-bottom: 10px; }
        .online { color: #4CAF50; font-weight: bold; }
        .footer { margin-top: 30px; text-align: center; opacity: 0.7; }
    </style>
</head>
<body>
    <div class="container">
        <h1>☁️ Self-Hosted Cloud Platform</h1>
        <div class="status-badge">● Server Online</div>
        <p>Your personal cloud server is running 24/7</p>
        
        <div class="service-grid">
            <div class="service-card">
                <h3>🖥️ Remote Desktop</h3>
                <p class="online">Active</p>
                <small>Port 3389</small>
            </div>
            <div class="service-card">
                <h3>🌐 Web Server</h3>
                <p class="online">Running</p>
                <small>Port 80/443</small>
            </div>
            <div class="service-card">
                <h3>💾 File Storage</h3>
                <p class="online">Available</p>
                <small>SMB/Nextcloud</small>
            </div>
            <div class="service-card">
                <h3>🗄️ Database</h3>
                <p class="online">Ready</p>
                <small>PostgreSQL</small>
            </div>
            <div class="service-card">
                <h3>🐳 Docker</h3>
                <p class="online">Available</p>
                <small>Container Platform</small>
            </div>
            <div class="service-card">
                <h3>🔒 VPN</h3>
                <p class="online">Connected</p>
                <small>Tailscale</small>
            </div>
        </div>
        
        <div class="footer">
            <p>Server Location: USA | Uptime: 24/7 | Auto-Restart: Every 5.5 Hours</p>
            <p>Connect via Remote Desktop or SSH</p>
        </div>
    </div>
</body>
</html>
'@
          
          # Save website
          $indexHtml | Out-File -FilePath "C:\Cloud\WebServer\wwwroot\index.html" -Encoding UTF8 -Force
          
          # Copy to IIS if available
          try {
            Copy-Item "C:\Cloud\WebServer\wwwroot\*" -Destination "C:\inetpub\wwwroot\" -Force -ErrorAction SilentlyContinue
          } catch {}
          
          Write-Host "✓ Web server configured"

      - name: 🔗 Connect to Tailscale Network
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          
          Write-Host "Installing Tailscale..."
          
          # Download Tailscale
          try {
            $downloadUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi"
            $installer = Join-Path $env:TEMP "tailscale.msi"
            
            Invoke-WebRequest -Uri $downloadUrl -OutFile $installer -ErrorAction Stop
            
            # Install
            Start-Process msiexec.exe -ArgumentList "/i `"$installer`" /quiet /norestart" -Wait -NoNewWindow
            
            Start-Sleep -Seconds 10
            
            Write-Host "✓ Tailscale installed"
          } catch {
            Write-Host "⚠ Tailscale installation failed: $_"
            exit 1
          }
          
          # Connect to Tailscale
          $tsExe = Join-Path ${env:ProgramFiles} "Tailscale\tailscale.exe"
          
          if (-not (Test-Path $tsExe)) {
            Write-Host "❌ Tailscale executable not found"
            exit 1
          }
          
          # Generate hostname
          $hostname = "win-cloud-" + (Get-Date -Format "HHmmss")
          Write-Host "Connecting as: $hostname"
          
          try {
            & $tsExe up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=$hostname
          } catch {
            Write-Host "⚠ Tailscale connection issue: $_"
          }
          
          # Wait for IP
          $tsIP = $null
          for ($i = 1; $i -le 20; $i++) {
            Start-Sleep -Seconds 5
            try {
              $tsIP = & $tsExe ip -4 2>$null
              if ($tsIP) {
                Write-Host "✓ Tailscale IP: $tsIP (attempt $i)"
                break
              }
            } catch {}
            Write-Host "Waiting for IP... attempt $i/20"
          }
          
          if (-not $tsIP) {
            Write-Host "⚠ Could not get Tailscale IP, continuing..."
            $tsIP = "acquiring..."
          }
          
          # Save IP
          echo "WINDOWS_IP=$tsIP" >> $env:GITHUB_ENV
          $tsIP | Out-File -FilePath "C:\Cloud\Config\tailscale_ip.txt" -Force

      - name: 💾 Setup Storage & Backup System
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          
          # Create backup script
          $backupScript = @'
# Cloud Backup Script
$source = "C:\Cloud\Data"
$backupDir = "C:\Cloud\Backups"
$timestamp = Get-Date -Format "yyyyMMdd-HHmmss"
$backupFile = Join-Path $backupDir "cloud-backup-$timestamp.zip"

try {
    if (Test-Path $source) {
        Compress-Archive -Path $source -DestinationPath $backupFile -CompressionLevel Optimal -Force
        Write-Host "Backup created: $backupFile"
        
        # Keep only last 10 backups
        Get-ChildItem $backupDir -Filter "cloud-backup-*.zip" | 
            Sort-Object LastWriteTime -Descending | 
            Select-Object -Skip 10 | 
            Remove-Item -Force
    }
} catch {
    Write-Host "Backup failed: $_"
}
'@
          
          $backupScript | Out-File -FilePath "C:\Cloud\Config\backup.ps1" -Encoding UTF8 -Force
          
          # Create scheduled backup task
          try {
            $action = New-ScheduledTaskAction -Execute "powershell.exe" -Argument "-File C:\Cloud\Config\backup.ps1"
            $trigger = New-ScheduledTaskTrigger -AtStartup -RepetitionInterval (New-TimeSpan -Minutes 30) -RepetitionDuration ([TimeSpan]::MaxValue)
            Register-ScheduledTask -TaskName "CloudBackup" -Action $action -Trigger $trigger -Force -ErrorAction SilentlyContinue | Out-Null
            Write-Host "✓ Backup system configured"
          } catch {
            Write-Host "⚠ Backup task registration skipped"
          }
          
          # Initial backup
          Write-Host "Creating initial backup..."
          & "C:\Cloud\Config\backup.ps1"

      - name: 📊 Display Cloud Information
        shell: pwsh
        run: |
          Write-Host "`n"
          Write-Host "╔══════════════════════════════════════════════════════════════════╗"
          Write-Host "║          ☁️  SELF-HOSTED CLOUD SERVER - READY                   ║"
          Write-Host "╠══════════════════════════════════════════════════════════════════╣"
          Write-Host "║  Server Type  : Windows Cloud Server                           ║"
          Write-Host "║  IP Address   : $env:WINDOWS_IP                                  ║"
          Write-Host "║  Username     : CloudAdmin                                     ║"
          Write-Host "║  Password     : $env:CLOUD_PASS                                  ║"
          Write-Host "║  RDP Port     : 3389                                           ║"
          Write-Host "║  Web Access   : http://$env:WINDOWS_IP                         ║"
          Write-Host "║                                                              ║"
          Write-Host "║  Location     : USA Eastern Time                              ║"
          Write-Host "║  Status       : 24/7 ONLINE                                   ║"
          Write-Host "║  Services     : RDP, Web, Storage, Database, VPN              ║"
          Write-Host "║  Backup       : Every 30 minutes                             ║"
          Write-Host "║  Auto-Restart : Every 5.5 hours                              ║"
          Write-Host "╠══════════════════════════════════════════════════════════════════╣"
          Write-Host "║  TO CONNECT:                                                  ║"
          Write-Host "║  1. Install Tailscale on your device                          ║"
          Write-Host "║  2. Connect to the same Tailscale network                    ║"
          Write-Host "║  3. Use Remote Desktop (mstsc) to: $env:WINDOWS_IP           ║"
          Write-Host "║  4. Login with credentials above                             ║"
          Write-Host "╚══════════════════════════════════════════════════════════════════╝"
          Write-Host "`n"

      - name: 🔄 Maintain Cloud Operation
        shell: pwsh
        run: |
          $ErrorActionPreference = "Continue"
          
          $startTime = Get-Date
          $maxMinutes = 340
          $statusFile = "C:\Cloud\Logs\status.log"
          
          Write-Host "Starting cloud maintenance loop..."
          
          while ($true) {
            try {
              $elapsed = ((Get-Date) - $startTime).TotalMinutes
              $remaining = $maxMinutes - $elapsed
              
              # Write status
              $status = @"
Timestamp: $(Get-Date -Format 'yyyy-MM-dd HH:mm:ss')
Uptime: $([math]::Round($elapsed, 1)) minutes
Remaining: $([math]::Round($remaining, 1)) minutes
Services: All Active
"@
              $status | Out-File -FilePath $statusFile -Force
              
              # Check critical services
              $services = @("TermService")
              foreach ($svc in $services) {
                try {
                  $serviceStatus = Get-Service $svc -ErrorAction Stop
                  if ($serviceStatus.Status -ne 'Running') {
                    Write-Host "Restarting $svc..."
                    Start-Service $svc -ErrorAction SilentlyContinue
                  }
                } catch {
                  Write-Host "Service check: $_"
                }
              }
              
              # Periodic backup
              if ([math]::Round($elapsed) % 30 -eq 0 -and $elapsed -gt 1) {
                Write-Host "[$(Get-Date -Format 'HH:mm:ss')] Running scheduled backup..."
                try {
                  & "C:\Cloud\Config\backup.ps1" 2>$null
                } catch {}
              }
              
              # Check approaching limit
              if ($remaining -le 5) {
                Write-Host "`n[$(Get-Date -Format 'HH:mm:ss')] ⚠ Approaching time limit"
                Write-Host "[$(Get-Date -Format 'HH:mm:ss')] Performing final backup..."
                
                # Final backup
                try {
                  $finalBackup = "C:\Cloud\Backups\final-backup-$(Get-Date -Format 'yyyyMMdd-HHmmss').zip"
                  Compress-Archive -Path "C:\Cloud\Data\*" -DestinationPath $finalBackup -CompressionLevel Optimal -Force
                  Write-Host "Final backup: $finalBackup"
                } catch {}
                
                Write-Host "[$(Get-Date -Format 'HH:mm:ss')] New instance will start automatically"
                break
              }
              
              # Status update
              Write-Host "[$(Get-Date -Format 'HH:mm:ss')] Cloud Active | Uptime: $([math]::Round($elapsed))m | Remaining: $([math]::Round($remaining))m" -NoNewline
              
              Start-Sleep -Seconds 60
              
            } catch {
              Write-Host "Loop error: $_"
              Start-Sleep -Seconds 5
            }
          }
          
          Write-Host "`nMaintenance loop ended - session complete"

  linux-cloud:
    if: ${{ github.event.inputs.linux_server != 'false' }}
    runs-on: ubuntu-latest
    timeout-minutes: 350
    concurrency:
      group: linux-cloud-${{ github.run_id }}
      cancel-in-progress: false
    
    steps:
      - name: 📥 Checkout Repository
        uses: actions/checkout@v3
        
      - name: 🐧 Setup Linux Cloud Server
        run: |
          set +e
          
          # Set timezone
          sudo timedatectl set-timezone America/New_York
          
          # Create directories
          sudo mkdir -p /opt/cloud/{data,web,db,storage,backups,logs,config,www}
          
          # Set permissions
          sudo chmod -R 755 /opt/cloud
          
          echo "✓ Linux cloud directories created"

      - name: 📦 Install Cloud Services
        run: |
          set +e
          
          # Update system
          sudo apt-get update -qq
          
          # Install services (with error handling)
          for pkg in nginx postgresql redis-server docker.io docker-compose openssh-server fail2ban ufw git curl wget vim htop netdata nodejs npm python3 python3-pip supervisor; do
            echo "Installing $pkg..."
            sudo apt-get install -y -qq $pkg 2>/dev/null && echo "✓ $pkg" || echo "⚠ $pkg skipped"
          done
          
          # Start services
          for svc in nginx postgresql redis-server docker ssh fail2ban netdata supervisor; do
            sudo systemctl start $svc 2>/dev/null && sudo systemctl enable $svc 2>/dev/null && echo "✓ $svc started" || echo "⚠ $svc unavailable"
          done

      - name: 🌐 Configure Web & Database
        run: |
          set +e
          
          # Configure Nginx
          sudo tee /etc/nginx/sites-available/cloud > /dev/null <<'ENDNGINX'
          server {
              listen 80 default_server;
              server_name _;
              root /opt/cloud/www;
              index index.html;
              
              location /api {
                  proxy_pass http://localhost:3000;
              }
              
              location /storage {
                  alias /opt/cloud/storage;
                  autoindex on;
              }
          }
          ENDNGINX
          
          sudo ln -sf /etc/nginx/sites-available/cloud /etc/nginx/sites-enabled/
          sudo rm -f /etc/nginx/sites-enabled/default
          sudo nginx -t && sudo systemctl restart nginx
          
          # Setup PostgreSQL
          sudo -u postgres psql -c "CREATE USER cloudadmin WITH PASSWORD 'cloudpass123';" 2>/dev/null || true
          sudo -u postgres psql -c "CREATE DATABASE clouddb OWNER cloudadmin;" 2>/dev/null || true
          sudo -u postgres psql -c "GRANT ALL PRIVILEGES ON DATABASE clouddb TO cloudadmin;" 2>/dev/null || true
          
          echo "✓ Web and database configured"

      - name: 🎨 Create Cloud Dashboard
        run: |
          cat > /opt/cloud/www/index.html <<'ENDHTML'
          <!DOCTYPE html>
          <html>
          <head>
              <title>Linux Cloud Server</title>
              <style>
                  * { margin: 0; padding: 0; box-sizing: border-box; }
                  body { font-family: Arial; background: #0a0a2e; color: #fff; padding: 20px; }
                  .header { text-align: center; padding: 30px; }
                  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; max-width: 1200px; margin: 0 auto; }
                  .card { background: rgba(255,255,255,0.1); padding: 20px; border-radius: 10px; }
                  .online { color: #00ff00; }
                  .service { padding: 8px; background: rgba(0,0,0,0.3); margin: 5px 0; border-radius: 5px; }
              </style>
          </head>
          <body>
              <div class="header">
                  <h1>🐧 Linux Cloud Server</h1>
                  <p class="online">● 24/7 Online</p>
              </div>
              <div class="grid">
                  <div class="card">
                      <h3>Web Services</h3>
                      <div class="service">Nginx: Running</div>
                      <div class="service">Node.js: Available</div>
                      <div class="service">Python: Available</div>
                  </div>
                  <div class="card">
                      <h3>Database</h3>
                      <div class="service">PostgreSQL: Active</div>
                      <div class="service">Redis: Running</div>
                  </div>
                  <div class="card">
                      <h3>Container Platform</h3>
                      <div class="service">Docker: Available</div>
                      <div class="service">Portainer: Optional</div>
                  </div>
                  <div class="card">
                      <h3>Monitoring</h3>
                      <div class="service">Netdata: Running</div>
                      <div class="service">htop: Available</div>
                  </div>
              </div>
          </body>
          </html>
          ENDHTML
          
          sudo chown www-data:www-data /opt/cloud/www/index.html
          echo "✓ Dashboard created"

      - name: 🔗 Setup Tailscale Network
        run: |
          set +e
          
          # Install Tailscale
          curl -fsSL https://tailscale.com/install.sh | sudo sh
          
          # Connect
          sudo tailscale up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname="linux-cloud-$(date +%H%M%S)"
          
          # Get IP
          for i in {1..15}; do
            TS_IP=$(tailscale ip -4 2>/dev/null)
            if [ -n "$TS_IP" ]; then
              echo "✓ Tailscale IP: $TS_IP (attempt $i)"
              break
            fi
            sleep 5
          done
          
          echo "LINUX_IP=${TS_IP:-acquiring}" >> $GITHUB_ENV
          echo "Tailscale connected"

      - name: 🐳 Deploy Additional Services
        run: |
          set +e
          
          # Deploy Portainer for container management
          sudo docker run -d --name portainer \
            -p 9443:9443 \
            -v /var/run/docker.sock:/var/run/docker.sock \
            -v portainer_data:/data \
            --restart always \
            portainer/portainer-ce 2>/dev/null && echo "✓ Portainer deployed" || echo "⚠ Portainer skipped"
          
          # Deploy File Browser for web-based file management
          sudo docker run -d --name filebrowser \
            -p 8080:80 \
            -v /opt/cloud:/srv \
            -v /opt/cloud/config/filebrowser.db:/database.db \
            --restart always \
            filebrowser/filebrowser 2>/dev/null && echo "✓ File Browser deployed" || echo "⚠ File Browser skipped"

      - name: 📊 Display Linux Cloud Info
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════════════╗"
          echo "║          🐧 LINUX CLOUD SERVER - ONLINE                         ║"
          echo "╠══════════════════════════════════════════════════════════════════╣"
          echo "║  IP Address    : $LINUX_IP                                      ║"
          echo "║  SSH Access    : ssh user@$LINUX_IP                             ║"
          echo "║  Web Dashboard : http://$LINUX_IP                               ║"
          echo "║  Portainer     : https://$LINUX_IP:9443                        ║"
          echo "║  File Browser  : http://$LINUX_IP:8080                         ║"
          echo "║  Netdata       : http://$LINUX_IP:19999                        ║"
          echo "║                                                              ║"
          echo "║  Services      : Nginx, PostgreSQL, Redis, Docker            ║"
          echo "║  Status        : 24/7 Active                                 ║"
          echo "║  Auto-Restart  : Every 5.5 hours                             ║"
          echo "╚══════════════════════════════════════════════════════════════════╝"
          echo ""

      - name: 🔄 Maintain Linux Cloud
        run: |
          set +e
          
          START_TIME=$(date +%s)
          MAX_SECONDS=20400
          
          while true; do
            CURRENT_TIME=$(date +%s)
            ELAPSED=$((CURRENT_TIME - START_TIME))
            REMAINING=$((MAX_SECONDS - ELAPSED))
            
            # Health checks
            for svc in nginx postgresql redis-server docker ssh; do
              if ! systemctl is-active --quiet $svc 2>/dev/null; then
                sudo systemctl restart $svc 2>/dev/null
                echo "[$(date +%H:%M:%S)] Restarted $svc"
              fi
            done
            
            # Backup every 30 minutes
            if [ $((ELAPSED % 1800)) -lt 60 ] && [ $ELAPSED -gt 60 ]; then
              sudo tar -czf "/opt/cloud/backups/backup-$(date +%Y%m%d-%H%M%S).tar.gz" /opt/cloud/data/ 2>/dev/null
              echo "[$(date +%H:%M:%S)] Backup completed"
              
              # Keep only last 5 backups
              ls -t /opt/cloud/backups/backup-*.tar.gz 2>/dev/null | tail -n +6 | xargs -r rm
            fi
            
            # Check timeout
            if [ $REMAINING -le 300 ]; then
              echo "[$(date +%H:%M:%S)] Preparing for restart..."
              
              # Final backup
              sudo tar -czf "/opt/cloud/backups/final-$(date +%Y%m%d-%H%M%S).tar.gz" /opt/cloud/ 2>/dev/null
              
              break
            fi
            
            echo "[$(date +%H:%M:%S)] Cloud Active | Uptime: $((ELAPSED/60))m | Remaining: $((REMAINING/60))m"
            sleep 60
          done
